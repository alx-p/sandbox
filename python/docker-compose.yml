services:
  app:
    build: .
    container_name: python-sandbox
    environment:
      # отладка
      - FLASK_ENV=development
      # Вывод сразу на экран
      - PYTHONUNBUFFERED=True                   
    ports:
      - "5000:5000"
    volumes:
      - ./app:/app
    command: tail -f /dev/null # чтобы контейнер не завершался
    #command: python app.py

volumes:
  app: